function tone(f0,f1,dur,type,vol,delay){
  const a=ac(); if(!a||!set.sfx)return;
  try{
    const t0=a.currentTime+(delay||0);
    const o=a.createOscillator(),g=a.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t0+dur);
    g.gain.setValueAtTime(vol||0.12,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    o.connect(g); g.connect(a.destination);
    o.start(t0); o.stop(t0+dur+0.05);
  }catch(e){}
}

function act(a,xy){
  ac();
  if(a==='pause'){
    if(st==='play')pause();
    else if(st==='paused')resume();
    else if(st==='dead'&&deathT>0.4)toMenu();
    else if(st==='stats'||st==='custom'||st==='shop'||st==='settings'||st==='guide'||st==='missions'){ resetConfirm=0; toMenu(); }
    musicMaybeStart(); return;
  }
  if(st==='stats'){ toMenu(); musicMaybeStart(); return; }
  if(st==='guide'){ if(a==='tap'||a==='up')toMenu(); return; }
  if(st==='missions'){ if(a==='tap'||a==='up')toMenu(); return; }
  if(st==='settings'){
    if(a==='tap'){
      if(inRect(xy,SET_DONE)){ resetConfirm=0; toMenu(); return; }
      const i=settingsRowAt(xy);
      if(i>=0 && i<3){ const k=SETTINGS_ROWS[i].k; set[k]=set[k]?0:1; saveSet(); resetConfirm=0;
        if(k==='music'){ set.music?(ac(),musicStart()):musicStop(); }
        if(k==='vibe'&&set.vibe)vib(20);
        tone(set[k]?660:330,set[k]?880:220,0.08,'square',0.08);
      } else if(i===4){ cycleLang(xy.x<352?-1:1); resetConfirm=0; tone(520,700,0.07,'square',0.08);
      } else if(i===3){
        if(resetConfirm>0){ doReset(); resetConfirm=0; }
        else { resetConfirm=1; setMsg=TR('reset_sure'); setMsgT=tt+2.5; tone(440,300,0.1,'square',0.1); }
      } else resetConfirm=0;
    }
    return;
  }
  if(st==='shop'){
    if(a==='left'){ shopTab=0; shopSel=0; shopScroll=0; return; }
    if(a==='right'){ shopTab=1; shopSel=0; shopScroll=0; return; }
    if(a==='up'){ shopSel=Math.max(0,shopSel-1); if(shopSel<shopScroll)shopScroll=shopSel; return; }
    if(a==='down'){ const n=(shopTab===0?UPGRADES:EGGS).length; shopSel=Math.min(n-1,shopSel+1); if(shopSel>=shopScroll+SHOP_VIS)shopScroll=shopSel-SHOP_VIS+1; return; }
    if(a==='buy'){ shopTab===0?buyUpgrade(shopSel):buyEgg(shopSel); return; }
    if(a==='tap'){
      if(inRect(xy,SHOP_DONE)){ toMenu(); return; }
      if(inRect(xy,SHOP_TAB1)){ shopTab=0; shopSel=0; shopScroll=0; return; }
      if(inRect(xy,SHOP_TAB2)){ shopTab=1; shopSel=0; shopScroll=0; return; }
      const row=shopRowAt(xy);
      if(row>=0){ shopSel=row; shopTab===0?buyUpgrade(row):buyEgg(row); }
    }
    return;
  }
  if(st==='custom'){
    if(a==='left'){ changeOpt(catSel,-1); return; }
    if(a==='right'){ changeOpt(catSel,1); return; }
    if(a==='up'){ catSel=(catSel-1+CATS.length)%CATS.length; return; }
    if(a==='down'){ catSel=(catSel+1)%CATS.length; return; }
    if(a==='tap'){
      if(inRect(xy,CUST_DONE)){ toMenu(); return; }
      const row=custRowAt(xy);
      if(row>=0){ catSel=row; changeOpt(row, xy.x<VW/2?-1:1); }
      else if(xy&&xy.y<40) toMenu();
    }
    return;
  }
  if(st==='menu'){
    if(a==='tap'){
      if(inRect(xy,SET_BTN)){ st='settings'; resetConfirm=0; tone(520,640,0.08,'square',0.08); return; }
      if(inRect(xy,GUIDE_BTN)){ st='guide'; tone(520,640,0.08,'square',0.08); return; }
      if(inRect(xy,STATS_BTN)){ st='stats'; tone(520,640,0.08,'square',0.08); return; }
      if(inRect(xy,CUSTOM_BTN)){ st='custom'; catSel=0; tone(520,640,0.08,'square',0.08); return; }
      if(inRect(xy,SHOP_BTN)){ st='shop'; shopTab=0; shopSel=0; shopScroll=0; tone(520,640,0.08,'square',0.08); return; }
      if(inRect(xy,MIS_BTN)){ st='missions'; checkMissions(); checkAch(); tone(520,640,0.08,'square',0.08); return; }
    }
    startRun(); musicMaybeStart(); return;
  }
  if(st==='paused'){
    if(a==='tap'){
      if(inRect(xy,PMUTE_BTN))toggleMute();
      else if(inRect(xy,PMENU_BTN))toMenu();
      else resume();
    }
    else if(a==='up')resume();
    return;
  }
  if(st==='dead'){

/* ---------------- spawn ---------------- */
function spawnCandies(x){
  const n=3+(Math.random()*3|0), base=GY-26-(Math.random()*28), arc=Math.random()<0.5;
  for(let i=0;i<n;i++){
    const yy=arc ? base-Math.round(Math.sin(i/Math.max(1,n-1)*Math.PI)*20) : base;
    ents.push({type:'candy', x:x+i*16, y:yy, bob:Math.random()*6});
  }
}
const PILL_POOL=['pillG','pillB','pillD','pillM','pillF','pillS','pillX'];
const PILL_W=[20,16,12,14,12,12,12];
function spawn(sp){
  const x=VW+60, r=Math.random(), m=dist/30;
  // periodo di grazia: verso la fine di turbo/razzo/nipotina niente trappole,
  // solo caramelle, cosi non si muore appena finisce l'effetto
  const grace=(turbo>0&&turbo<1.4)||(fly>0&&fly<1.4);
  if(grace){
    spawnCandies(x);
    spawnT=Math.max(0.55,(0.8+Math.random()*0.7)*(300/sp));
    return;
  }
  if(r<0.13){
    spawnCandies(x);
  } else if(r<0.30){
    let tot=PILL_W.reduce((a,b)=>a+b,0), rr=Math.random()*tot, ti=0;
    for(let i=0;i<PILL_POOL.length;i++){ if(rr<PILL_W[i]){ti=i;break;} rr-=PILL_W[i]; }
    ents.push({type:PILL_POOL[ti], x, y:GY-(Math.random()<0.5?26:58), bob:Math.random()*6});
  } else if(r<0.36 && m>50){
    const e={type:'malus',x};
    if(firstMalus){e.hint='SALTA!';firstMalus=false;}
    ents.push(e);
  } else {
    const traps=['pit','net'];
    if(m>120)traps.push('cart');
    if(m>260)traps.push('bird');
    const t=traps[Math.random()*traps.length|0];
    if(t==='pit'){
      const w=44+Math.random()*16+Math.min(8,dist*0.002);
      const e={type:'pit',x,w};
      if(firstPit){e.hint='SALTA!';firstPit=false;}
      ents.push(e);
    } else if(t==='net'){
      const e={type:'net',x};
      if(firstNet){e.hint='SCIVOLA!';firstNet=false;}
      ents.push(e);
    } else if(t==='cart'){
      const e={type:'cart',x};
      if(firstCart){e.hint='SALTA!';firstCart=false;}
      ents.push(e);
    } else {
      const e={type:'bird',x};
      if(firstBird){e.hint='SCIVOLA!';firstBird=false;}
      ents.push(e);
    }
  }
  spawnT=Math.max(0.55,(0.8+Math.random()*0.7)*(300/sp));
}

function smashTrap(e,cx,cy,col){
  if(inv<=0)shield=Math.max(0,shield-1);  // se non c'è invincibilità, consuma una carica scudo
  combo=0; mult=1;                        // preso un ostacolo: il combo si azzera
  e.dead=true; score+=250; SFX.smash(); shake=5;
  burst(cx,cy,col,16); burst(cx,cy,'#fff',8); vib(20);
}
function collide(){
  const pl=prect(), prot=inv>0||shield>0;
  for(const e of ents){
    if(e.dead)continue;
    if(e.type==='net'){
      const r={x:e.x-55,y:GY-60,w:22,h:43};
      if(fly<=0 && hit(pl,r)){ if(prot)smashTrap(e,e.x-44,GY-38,'#f2a7bd'); else { caught(e); return; } }
    } else if(e.type==='cart'){
      const r={x:e.x-13,y:GY-20,w:26,h:20};
      if(fly<=0 && hit(pl,r)){ if(prot)smashTrap(e,e.x,GY-12,'#c9ccd2'); else { crash('cart'); return; } }
    } else if(e.type==='bird'){
      const r={x:e.x-8,y:GY-46,w:18,h:16};
      if(fly<=0 && hit(pl,r)){ if(prot)smashTrap(e,e.x,GY-38,'#6b7280'); else { crash('bird'); return; } }
    } else if(e.type==='malus'){
      const r={x:e.x-7,y:GY-28,w:14,h:28};
      if(fly<=0 && hit(pl,r)){
        e.dead=true;
        if(inv>0){ score+=150; SFX.smash(); shake=4; burst(e.x,GY-16,'#a64bb0',14); }
        else { flip=6; SFX.caught(); shake=5; vib(120); burst(e.x,GY-16,'#a64bb0',16); }
      }
    } else if(e.type==='proj'){
      const lo=e.y>GY-24;
      const r=lo?{x:e.x-6,y:GY-20,w:12,h:20}:{x:e.x-6,y:GY-46,w:12,h:16};
      if(fly<=0 && hit(pl,r)){ if(prot)smashTrap(e,e.x,e.y,'#cdeaf5'); else { crash('proj'); return; } }
    } else if(e.type==='candy'){
      const r={x:e.x-7,y:e.y-7,w:14,h:14};
      if(hit(pl,r)){ e.dead=true; coins+=(1+upg.candy)*(x2c>0?2:1); score+=25+upg.candy*15; totCandy++;
        for(const m of missions)if(m.t==='candy')m.p++;
        SFX.coin(); vib(8); part(e.x,e.y,0,-40,80,.3,'#ff6f91',2); }
    } else if(e.type.startsWith('pill')){
      const r={x:e.x-9,y:e.y-9,w:18,h:18};
      if(hit(pl,r)){
        e.dead=true;
        if(e.type==='pillB'){ inv=10+upg.inv*2; SFX.pillB(); burst(e.x,e.y,'#5d93ff',16); }
        else if(e.type==='pillG'){ turbo=8+upg.turbo*2; SFX.pillG(); burst(e.x,e.y,'#3ecf5a',16); }
        else if(e.type==='pillD'){ shield=Math.min(1+upg.shield, shield+1); SFX.power(); burst(e.x,e.y,'#cfe6e6',16); }
        else if(e.type==='pillM'){ mag=7+upg.mag*2; SFX.power(); burst(e.x,e.y,'#f24b4b',16); }
        else if(e.type==='pillF'){ fly=4+upg.fly*1.5; SFX.power(); burst(e.x,e.y,'#ffb24a',16); }
        else if(e.type==='pillS'){ slow=5; SFX.power(); burst(e.x,e.y,'#2bd0c8',16); }
        else if(e.type==='pillX'){ x2c=8; SFX.power(); burst(e.x,e.y,'#f5c542',16); }
        score+=100*(turbo>0?2:1); vib(15);
        runPow++; for(const m of missions)if(m.t==='power')m.p++;
      }
    }
  }
  ents=ents.filter(e=>!e.dead);
}

/* ---------------- update ---------------- */
function update(dt){
  tt+=dt;
  if(st==='paused')return;
  shake=Math.max(0,shake-dt*22);
  for(const p of parts){ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.g*dt; }
  parts=parts.filter(p=>p.t<p.life);

  if(st==='menu'||st==='stats'||st==='custom'||st==='shop'||st==='settings'||st==='guide'||st==='missions'){ menuDist+=60*dt; lockFlash=Math.max(0,lockFlash-dt); return; }

  if(st==='play'){
    const sp=speed*(turbo>0?1.55:1)*(slow>0?0.55:1);
    dist+=sp*dt;
    speed=170+Math.min(180,dist*0.012);
    score+=dt*sp*0.06*(turbo>0?2:1)*mult;
    inv=Math.max(0,inv-dt); turbo=Math.max(0,turbo-dt);
    mag=Math.max(0,mag-dt); fly=Math.max(0,fly-dt); flip=Math.max(0,flip-dt); slow=Math.max(0,slow-dt); x2c=Math.max(0,x2c-dt);
    biomeFlash=Math.max(0,biomeFlash-dt);
    // BOSS: il Primario ogni 500 m
    if(!bossActive && dist/30>=bossNext){ bossActive=true; bossT=9; bossThrowT=1.3; bossHits=0; bossX=VW+40; misMsg='ARRIVA IL PRIMARIO!'; misMsgT=tt+2.4; SFX.caught(); }
    if(bossActive){
      bossX += ((VW-46)-bossX)*Math.min(1,dt*3);
      bossT-=dt;
      if(bossX<VW-20){
        bossThrowT-=dt;
        if(bossThrowT<=0){ const lo=Math.random()<0.5; ents.push({type:'proj', x:bossX-12, y:lo?GY-12:GY-40}); bossThrowT=Math.max(0.5,0.95-Math.min(0.4,dist*0.00002)); SFX.jump(); }
      }
      if(bossT<=0){ bossActive=false; bossNext+=500; coins+=50; misMsg='PRIMARIO SCONFITTO! +50'; misMsgT=tt+2.4; SFX.record(); ents=ents.filter(e=>e.type!=='proj'); }
    } else {
      spawnT-=dt; if(spawnT<=0)spawn(sp);
    }

    const bi=Math.floor((dist/30)/BIOME_M);
    if(bi!==curBi){ curBi=bi; biomeName=BIOMES[bi%BIOMES.length].nome; biomeFlash=2.4; }

    P.run+=dt*sp*0.055;
    P.buf=Math.max(0,P.buf-dt);
    if(P.slide>0)P.slide-=dt;
    if(fly>0){ // deambulatore-razzo: vola sopra le trappole
      P.slide=0; P.ground=false; P.vy=0;
      P.y += (-66-P.y)*Math.min(1,dt*9);
      if(Math.random()<0.7) part(PX+(Math.random()-.5)*8, GY+P.y+2,
        (Math.random()-.5)*30, 60+Math.random()*50, 60, .35,
        Math.random()<0.5?'#ffb24a':'#ff6a2a', 2);
    } else if(!P.ground){
      P.vy+=GRAV*dt; P.y+=P.vy*dt;
      if(P.y>=0){
        const pit=inv>0?null:overPit();
        if(pit){ startFall(pit); }
        else{
          P.y=0; P.vy=0; P.ground=true; dust(PX,GY);
          if(P.qSlide){ P.qSlide=false; doSlide(); }
          else if(P.buf>0){ P.buf=0; doJump(); }
        }
      }
    } else if(inv<=0){
      const pit=overPit(); if(pit)startFall(pit);
    }
    if(st!=='play')return;

    for(const e of ents)e.x-=sp*dt;
    // ostacolo superato -> combo / moltiplicatore
    for(const e of ents){
      if(!e.scored && (e.type==='pit'||e.type==='net'||e.type==='cart'||e.type==='bird')){
        const past = e.type==='pit' ? (e.x+e.w < PX-4) : (e.type==='net' ? (e.x-44 < PX-12) : (e.x < PX-12));
        if(past){ e.scored=true; combo++; runDodge++; mult=Math.min(9,1+Math.floor(combo/5)); score+=8*mult; }
      }
    }
    // progress missioni "per corsa"
    for(const m of missions){
      if(m.t==='dist')m.p=Math.max(m.p,Math.floor(dist/30));
      else if(m.t==='score')m.p=Math.max(m.p,Math.floor(score));
      else if(m.t==='dodge')m.p=Math.max(m.p,runDodge);
    }
    checkMissions();
    ents=ents.filter(e=>e.x>-140);
    // magnete: attira le caramelle vicine
    if(mag>0){
      const py=GY+P.y-17;
      for(const e of ents){ if(e.type==='candy'){
        const dx=PX-e.x, dy=py-e.y, dd=Math.hypot(dx,dy)||1;
        if(dd<85+upg.mag*22){ e.x+=dx/dd*240*dt; e.y+=dy/dd*240*dt; }
      }}
    }
    // pet: raccoglie le caramelle vicine (le attira verso il nonno)
    if(upg.pet){
      const py=GY+P.y-17;
      for(const e of ents){ if(e.type==='candy'){
        const dx=PX-e.x, dy=py-e.y, dd=Math.hypot(dx,dy)||1;
        if(dd<62){ e.x+=dx/dd*210*dt; e.y+=dy/dd*210*dt; }
      }}
    }
    collide();

    // scintille invincibilità
    if(inv>0){ sparkT-=dt; if(sparkT<=0){ sparkT=0.05;
      part(PX+(Math.random()-.5)*26, GY+P.y-Math.random()*34,
           -60-Math.random()*40, (Math.random()-.5)*40, 0, .4, '#9cc4ff', 2); } }
    // scie turbo
    if(turbo>0 && Math.random()<0.5)
      part(VW+10, 20+Math.random()*(GY-30), -(sp*2.2), 0, 0, .35, 'rgba(255,255,255,0.5)', 1);
  }
  else if(st==='dying'){
    deathT+=dt;
    if(deathKind==='pit'){
      P.vy+=900*dt; P.y+=P.vy*dt; fallRot+=dt*4;
      if(deathT>0.9)gameOver();
    } else if(deathKind==='cart'||deathKind==='bird'||deathKind==='proj'){
      P.vy+=1500*dt; P.y+=P.vy*dt; if(P.y>0)P.y=0; fallRot-=dt*6;
      if(deathT>1.0)gameOver();
    } else {
      if(deathT>1.05)gameOver();
    }
  }
  else if(st==='dead'){ deathT+=dt; }
}

const rnd=n=>Math.floor(Math.random()*n);
function newMission(){
  const t=['dist','candy','dodge','power','score'][rnd(5)];

  if(t==='dist'){ tgt=200+rnd(7)*100; r=Math.round(tgt/8); }

}

function drawGrandpa(cx,by,pose,ph,rot){
  ctx.save(); ctx.translate(cx|0,by|0); if(rot)ctx.rotate(rot);
  if(pose==='slide'){
    R(1,-9,14,4,CC.pj);  R(2,-5,13,4,CC.pjd);
    R(14,-10,6,4,GP.slip); R(14,-5,6,4,GP.slip);
    R(-12,-14,15,10,CC.pj);
    R(-9,-14,2,10,CC.pjd); R(-4,-14,2,10,CC.pjd);
    R(-7,-16,9,4,CC.skin);
    R(-22,-22,11,10,CC.skin);
    R(-23,-24,13,4,CC.hair); R(-23,-20,3,6,CC.hair);
    R(-14,-19,4,3,GP.dk);
    R(-15,-13,6,2,CC.hair);
    ctx.restore(); return;
  }
  const s=pose==='run'?Math.sin(ph):0;
  const bob=pose==='run'?-Math.round(Math.abs(Math.cos(ph))*2):0;
  ctx.translate(0,bob);
  const A=Math.round(s*5);
  // braccio dietro
  if(pose==='jump') R(-9,-30,4,9,CC.pjd);
  else R(-8-Math.round(A*0.6),-23,4,9,CC.pjd);
  // gambe
  if(pose==='jump'){
    R(-6,-12,5,8,CC.pjd); R(1,-11,5,7,CC.pj);
    R(-9,-6,8,3,GP.slip); R(0,-6,8,3,GP.slip);
  } else {
    for(const o of [-A,A]){
      const h=Math.max(7,12-Math.max(0,o));
      R(-3+o,-12,4,h, o>=0?CC.pj:CC.pjd);
      R(-4+o+(o>0?2:-1), -12+h-1, 6,3, GP.slip);
    }
  }
  // torso + fantasia pigiama
  R(-7,-25,14,13,CC.pj);
  if(CC.pjPat===0){ R(-5,-25,2,13,CC.pjd); R(-1,-25,2,13,CC.pjd); R(3,-25,2,13,CC.pjd); }
  else if(CC.pjPat===2){ R(-5,-23,2,2,CC.pjd); R(0,-21,2,2,CC.pjd); R(4,-24,2,2,CC.pjd);
                         R(-3,-18,2,2,CC.pjd); R(2,-16,2,2,CC.pjd); R(-6,-19,2,2,CC.pjd); }
  else if(CC.pjPat===3){ // STELLE (mago)
    const star=(sx,sy)=>{R(sx,sy-1,1,3,'#ffe066'); R(sx-1,sy,3,1,'#ffe066');};
    star(-3,-22); star(3,-19); star(-5,-16); star(1,-24); star(5,-23);
  }
  // testa
  R(-4,-35,11,10,CC.skin);
  drawHair(CC.hairStyle,CC.hair);
  R(2,-32,4,3,GP.dk); R(-1,-31,3,1,GP.dk);
  R(6,-29,2,3,CC.skin2);
  // braccio davanti + bastone
  if(pose==='jump'){
    R(5,-31,4,9,CC.pj); R(6,-34,3,3,CC.skin);
    drawCaneAt(CC.caneType,CC.cane, 7,-33,13);
  } else {
    const ax=4+Math.round(A*0.6);
    R(ax,-23,4,8,CC.pj); R(ax,-15,3,3,CC.skin);
    drawCaneAt(CC.caneType,CC.cane, ax+1,-15,15);
  }
  ctx.restore();
}

];
function hx2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerpHex(a,b,t){ if(t<=0)return a; if(t>=1)return b;
  const A=hx2rgb(a),B=hx2rgb(b);
  return 'rgb('+Math.round(A[0]+(B[0]-A[0])*t)+','+Math.round(A[1]+(B[1]-A[1])*t)+','+Math.round(A[2]+(B[2]-A[2])*t)+')'; }
function biomePal(d){
  const f=(d/30)/BIOME_M;
  const i=md(Math.floor(f),BIOMES.length), j=(i+1)%BIOMES.length;  // indice sempre valido
  let t=f-Math.floor(f);
  t = t<0.85?0:(t-0.85)/0.15;       // transizione solo nell'ultimo tratto
  const A=BIOMES[i],B=BIOMES[j],W={};
  for(const k of ['sky0','sky1','hill','grass','grassD','tree','tree2','side','sideD','soil','soilD','fence'])
    W[k]=lerpHex(A[k],B[k],t);
  W.night=A.night*(1-t)+B.night*t;
  W.town =A.town *(1-t)+B.town *t;
  return W;
}
function drawWorld(d){
  const W=biomePal(d), nF=W.night;
  // cielo
  const sky=ctx.createLinearGradient(0,0,0,170);
  sky.addColorStop(0,W.sky0); sky.addColorStop(1,W.sky1);
  ctx.fillStyle=sky; ctx.fillRect(0,0,VW,170);
  // stelle (notte)
  if(nF>0.05){
    ctx.globalAlpha=nF;
    for(let i=0;i<40;i++) R(md(i*97,VW),(i*53)%150,1+(i%2),1+(i%2),'#fdf6d0');
    ctx.globalAlpha=1;

/* ---------------- meteo dinamico ---------------- */
const WEATHER_M=210; // metri per fase meteo
function weatherInt(d){
  if(st==='play'||st==='dying'||st==='dead'||st==='paused') d+=weatherSeed; // fase casuale per la corsa
  const f=(d/30)/WEATHER_M, i=md(Math.floor(f),4), j=(i+1)%4;
  let t=f-Math.floor(f); t=t<0.85?0:(t-0.85)/0.15;
  const I=k=>((i===k?1:0)*(1-t)+(j===k?1:0)*t);
  return {sunset:I(1), rain:I(2), fog:I(3)}; // 0 = sereno
}
function drawWeather(d){
  const w=weatherInt(d);
  if(w.sunset>0.01){
    const g=ctx.createLinearGradient(0,0,0,VH);
    g.addColorStop(0,'rgba(255,120,40,'+(0.30*w.sunset).toFixed(2)+')');
    g.addColorStop(0.6,'rgba(255,90,60,'+(0.16*w.sunset).toFixed(2)+')');
    g.addColorStop(1,'rgba(120,40,90,'+(0.10*w.sunset).toFixed(2)+')');
    ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  }
  if(w.rain>0.01){
    ctx.fillStyle='rgba(40,55,75,'+(0.26*w.rain).toFixed(2)+')'; ctx.fillRect(0,0,VW,VH);
    ctx.strokeStyle='rgba(180,200,230,'+(0.5*w.rain).toFixed(2)+')'; ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<90;i++){
      const x=md(i*61-tt*900, VW+40)-20, y=md(i*47+tt*900, VH+40)-20;
      ctx.moveTo(x,y); ctx.lineTo(x-4,y+10);
    }
    ctx.stroke();
  }
  if(w.fog>0.01){
    ctx.fillStyle='rgba(225,228,232,'+(0.30*w.fog).toFixed(2)+')'; ctx.fillRect(0,0,VW,VH);
    ctx.fillStyle='rgba(240,242,245,'+(0.18*w.fog).toFixed(2)+')';
    for(let i=0;i<3;i++){
      const y=60+i*60, x=md(-tt*(18+i*10),VW+200)-100;
      ctx.fillRect(x,y,200,26); ctx.fillRect(x+VW+40,y,200,26);
    }
  }
}

/* ---------------- frame ---------------- */
function draw(){
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);

  const d=(st==='menu'||st==='stats'||st==='custom'||st==='shop'||st==='settings'||st==='guide'||st==='missions')?menuDist:dist;
  drawWorld(d);
  for(const e of ents){
    if(e.type==='pit')drawPit(e);
  }
  for(const e of ents){
    if(e.type==='net'){
      if(st==='dying'&&deathKind==='net'&&e===netHit)drawNet(e,true);
      else drawNet(e,false);
    }
    else if(e.type==='cart')drawCart(e);
    else if(e.type==='bird')drawBird(e);
    else if(e.type==='malus')drawMalus(e);
    else if(e.type==='proj')drawProj(e);
    else if(e.type==='candy')drawCandy(e);
    else if(e.type.startsWith('pill'))drawPill(e);
  }
  // boss
  if(bossActive && (st==='play'||st==='paused'||st==='dying')) drawBoss(bossX);
  // nonno
  if(st==='play'||st==='paused'){
    if(upg.pet) drawDog(PX-26, GY, P.run*0.9);   // cagnolino
    if(inv>0 && !(inv<2.5 && Math.floor(tt*8)%2===0)){
      const g=ctx.createRadialGradient(PX,GY+P.y-17,4,PX,GY+P.y-17,30);
      g.addColorStop(0,'rgba(120,170,255,0.45)'); g.addColorStop(1,'rgba(120,170,255,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(PX,GY+P.y-17,30,0,Math.PI*2); ctx.fill();
    }
    const pose=fly>0?'jump':(P.slide>0?'slide':(P.ground?'run':'jump'));
    if(fly>0){ R(PX-3,GY+P.y+1,6,4,'#7a7a82'); R(PX-2,GY+P.y+5,4,2,'#ffb24a'); } // ugello razzo
    drawGrandpa(PX,GY+P.y,pose,P.run);
    if(shield>0){ // dentiera-scudo che orbita
      const ang=tt*3, ox=PX+Math.round(Math.cos(ang)*18), oy=GY+P.y-30+Math.round(Math.sin(ang)*6);
      R(ox-5,oy-2,10,3,'#fff'); R(ox-5,oy+1,10,2,'#f0a8b8');
      for(let i=-4;i<=4;i+=2)R(ox+i,oy-2,1,3,'#d8d8d8');
    }
  } else if(st==='dying'&&deathKind==='pit'){
    drawGrandpa(fallX,GY+P.y,'jump',0,fallRot);
  } else if(st==='dying'&&(deathKind==='cart'||deathKind==='bird'||deathKind==='proj')){
    drawGrandpa(PX,GY+P.y,'jump',0,fallRot);
  } else if(st==='dead'){
    // niente nonno: è caduto o catturato (resta la scena)
    if(deathKind==='net'&&netHit)drawNet(netHit,true);
  }
  // particelle
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,1-p.t/p.life);
    ctx.fillStyle=p.c; ctx.fillRect(p.x|0,p.y|0,p.s,p.s);
  }
  ctx.globalAlpha=1;
  // hint tutorial
  if(st==='play')for(const e of ents)drawHint(e);

  // meteo (sopra la scena, sotto HUD/menu)
  drawWeather(d);

  ctx.restore();

  // annuncio scenario
  if(biomeFlash>0 && (st==='play'||st==='paused')){
    ctx.globalAlpha=Math.min(1,biomeFlash);
    txt(TR('scenario')+' '+nm(biomeName),VW/2,52,13,'#ffe066','center');
    ctx.globalAlpha=1;
  }

  if(st==='play'||st==='dying'||st==='paused')drawHUD();
  if(st==='paused')drawPaused();
  if(st==='menu')drawMenu();
  if(st==='stats')drawStats();
  if(st==='custom')drawCustom();
  if(st==='shop')drawShop();
  if(st==='settings')drawSettings();
  if(st==='guide')drawGuide();
  if(st==='missions')drawMissions();
  if(st==='dead'){ drawHUD(); drawDead(); }
}

let last=performance.now(), _lw=0, _lh=0;
function frame(now){
  if(innerWidth!==_lw || innerHeight!==_lh){ _lw=innerWidth; _lh=innerHeight; fit(); }
  // dt sempre >=0: un primo frame con dt negativo mandava in errore il disegno
  const dt=Math.max(0, Math.min(0.033,(now-last)/1000)); last=now;
  // rete di sicurezza: un errore in un frame NON deve fermare il loop (= schermo nero)
  try{ update(dt); draw(); }catch(e){}
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
document.addEventListener('visibilitychange',()=>{ last=performance.now(); });

// PWA web: service worker per giocare offline.
// Dentro l'app (Capacitor) NON si usa il SW: i file sono già locali e sempre
// aggiornati ad ogni build; rimuoviamo eventuali SW/cache vecchi rimasti.
if(window.Capacitor){
  if('serviceWorker' in navigator)
    navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
  if(window.caches)
    caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});
} else if('serviceWorker' in navigator && location.protocol!=='file:' && window.self===window.top){
  // Registriamo il service worker per il gioco offline. NIENTE ricarica
  // automatica: la pagina e' network-first, quindi ogni apertura prende gia'
  // l'ultima versione quando sei online (nessun lampeggio/riavvio).
  addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
