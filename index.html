<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1426">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Nonno Run — Fuga dal Ricovero</title>
<style>
  html,body{margin:0;padding:0;height:100%;background:#1a1426;overflow:hidden;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
  body{display:flex;align-items:center;justify-content:center;}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;touch-action:none;
    box-shadow:0 0 60px rgba(0,0,0,.6);}
</style>

<body>
<canvas id="g" width="480" height="270"></canvas>
<script>
'use strict';
/* ============================================================
   NONNO RUN — Fuga dal Ricovero
   Endless runner: il nonno Gino scappa dalla casa di riposo.
   ↑ / tap        = salta i fossi
   ↓ / swipe giù  = scivola sotto i retini delle infermiere
   Pillola BLU    = invincibile 10s
   Pillola VERDE  = turbo, tutto più veloce e punti x2 per 8s
   ============================================================ */
const VW=480, VH=270, GY=230, PX=110;
const cv=document.getElementById('g'), ctx=cv.getContext('2d');
ctx.imageSmoothingEnabled=false;

let isPortrait=false;
function fit(){
  const s=Math.min(innerWidth/VW, innerHeight/VH);
  cv.style.width=(VW*s)+'px'; cv.style.height=(VH*s)+'px';
  isPortrait = innerHeight>innerWidth;
}
addEventListener('resize',fit); fit();

/* ---------------- audio ---------------- */
let AC=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  if(AC&&AC.state==='suspended')AC.resume(); return AC; }
let muted=localStorage.getItem('nonnoRunMuted')==='1';
function vib(p){ if(!muted && navigator.vibrate){ try{navigator.vibrate(p);}catch(e){} } }
function tone(f0,f1,dur,type,vol,delay){
  const a=ac(); if(!a||muted)return;
  try{
    const t0=a.currentTime+(delay||0);
    const o=a.createOscillator(),g=a.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t0);
    o.frequency.exponentialRampToValueAtTime(Math.max(f1,1),t0+dur);
    g.gain.setValueAtTime(vol||0.12,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+dur);
    o.connect(g); g.connect(a.destination);
    o.start(t0); o.stop(t0+dur+0.05);
  }catch(e){}
}
const SFX={
  jump(){tone(240,520,0.16,'square',0.10);},
  slide(){tone(320,130,0.14,'sawtooth',0.09);},
  pillB(){tone(523,523,0.09,'square',0.11);tone(659,659,0.09,'square',0.11,0.09);
          tone(784,784,0.14,'square',0.11,0.18);},
  pillG(){tone(330,880,0.28,'sawtooth',0.11);},
  smash(){tone(760,110,0.2,'square',0.14);},
  fall(){tone(620,55,0.7,'sawtooth',0.14);},
  caught(){tone(880,880,0.08,'square',0.12);tone(660,660,0.08,'square',0.12,0.1);
           tone(440,180,0.5,'sawtooth',0.12,0.2);},
  record(){tone(523,523,.1,'square',.12);tone(659,659,.1,'square',.12,.1);
           tone(784,784,.1,'square',.12,.2);tone(1046,1046,.25,'square',.12,.3);}
};

/* ---------------- musica (traccia mp3) ---------------- */
let bgm=null;
function musicInit(){
  if(bgm)return;
  bgm=new Audio('music.mp3');
  bgm.loop=true; bgm.volume=0.55; bgm.preload='auto';
}
function musicStart(){ if(muted)return; musicInit(); const p=bgm.play(); if(p&&p.catch)p.catch(()=>{}); }
function musicStop(){ if(bgm){ try{bgm.pause();}catch(e){} } }
function musicMaybeStart(){ if(!muted)musicStart(); }
function toggleMute(){
  muted=!muted; localStorage.setItem('nonnoRunMuted',muted?'1':'0');
  if(muted)musicStop(); else { ac(); musicStart(); }
}

/* ---------------- stato ---------------- */
const GRAV=1500, JV=-410;
let st='menu', tt=0, menuDist=0;
let dist=0, score=0, speed=170, spawnT=1.5;
let P=null, ents=[], parts=[];
let inv=0, turbo=0, shake=0, sparkT=0;
let deathT=0, deathKind='', deathMsg='', fallX=0, fallRot=0, netHit=null;
let newHi=false, firstPit=true, firstNet=true, firstCart=true, firstBird=true;
let curBi=0, biomeName='', biomeFlash=0;
let hi=+(localStorage.getItem('nonnoRunHi')||0);
let games=+(localStorage.getItem('nonnoRunGames')||0);
let totM=+(localStorage.getItem('nonnoRunTotM')||0);
let topRuns=[]; try{topRuns=JSON.parse(localStorage.getItem('nonnoRunTop')||'[]');}catch(e){topRuns=[];}
let shareMsg='', shareMsgT=0;

function reset(){
  dist=0; score=0; speed=170; spawnT=1.5;
  P={y:0,vy:0,ground:true,slide:0,buf:0,qSlide:false,run:0};
  ents=[]; parts=[]; inv=0; turbo=0; shake=0;
  newHi=false; firstPit=true; firstNet=true; firstCart=true; firstBird=true;
  netHit=null; fallRot=0; curBi=0; biomeName=''; biomeFlash=0;
}
const md=(v,m)=>((v%m)+m)%m;
const hit=(a,b)=>a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;
function prect(){
  const h=P.slide>0?12:34;
  return {x:PX-8, y:GY+P.y-h, w:16, h:h};
}

/* ---------------- particelle ---------------- */
function part(x,y,vx,vy,g,life,c,s){ parts.push({x,y,vx,vy,g,life,t:0,c,s:s||2}); }
function dust(x,y){ for(let i=0;i<6;i++)
  part(x+(Math.random()-.5)*12, y-2, (Math.random()-.5)*40-30, -Math.random()*50, 120,
       .4+Math.random()*.3, '#cbb89a', 2); }
function burst(x,y,c,n){ for(let i=0;i<(n||14);i++){
  const a=Math.random()*Math.PI*2, v=40+Math.random()*90;
  part(x,y,Math.cos(a)*v,Math.sin(a)*v-40, 160, .5+Math.random()*.4, c, 2+(Math.random()*2|0)); } }

/* ---------------- input ---------------- */
const PAUSE_BTN ={x:VW-32,y:6,w:26,h:24};
const MUTE_BTN  ={x:6,y:6,w:30,h:22};
const STATS_BTN ={x:VW-66,y:6,w:60,h:22};
const RESUME_BTN={x:VW/2-74,y:112,w:148,h:28};
const PMENU_BTN ={x:VW/2-74,y:148,w:148,h:28};
const PMUTE_BTN ={x:VW/2-74,y:184,w:148,h:26};
const STATS_BACK={x:VW/2-60,y:238,w:120,h:26};
const DEAD_RETRY={x:58,y:238,w:108,h:26};
const DEAD_SHARE={x:186,y:238,w:108,h:26};
const DEAD_MENU ={x:314,y:238,w:108,h:26};
const CUSTOM_BTN={x:VW/2-70,y:90,w:140,h:20};
const CUST_DONE ={x:VW/2-50,y:242,w:100,h:24};
const inRect=(xy,r)=>!!xy&&xy.x>=r.x&&xy.x<=r.x+r.w&&xy.y>=r.y&&xy.y<=r.y+r.h;
function custRowAt(xy){ if(!xy)return -1; const i=Math.floor((xy.y-77)/19); return (xy.y>=77 && i>=0 && i<CATS.length)?i:-1; }
function pause(){ if(st==='play'){ st='paused'; tone(330,220,0.1,'square',0.08); } }
function resume(){ if(st==='paused'){ st='play'; last=performance.now(); tone(220,440,0.1,'square',0.08); } }
function toMenu(){ reset(); st='menu'; tone(520,300,0.12,'square',0.08); }
function retry(){ reset(); st='play'; }
function shareScore(){
  const m=Math.floor(dist/30), s=Math.floor(score);
  const text='Sono scappato dalla casa di riposo per '+m+' m ('+s+' punti) in Nonno Run! 🏃';
  const url='https://sp0pex.github.io/nonno-run/';
  if(navigator.share){ navigator.share({title:'Nonno Run',text:text,url:url}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(text+' '+url).then(()=>{shareMsg='COPIATO NEGLI APPUNTI!';shareMsgT=tt+1.8;}).catch(()=>{}); }
  else { shareMsg='CONDIVISIONE NON DISPONIBILE'; shareMsgT=tt+1.8; }
}
function doJump(){
  if(st!=='play')return;
  if(P.ground){ P.slide=0; P.vy=JV; P.ground=false; SFX.jump(); dust(PX,GY); }
  else P.buf=0.12;
}
function doSlide(){
  if(st!=='play')return;
  if(P.ground){ if(P.slide<=0)SFX.slide(); P.slide=0.62; dust(PX,GY); }
  else { P.vy=Math.max(P.vy,0)+460; P.qSlide=true; }
}
function canvasXY(cx,cy){
  const r=cv.getBoundingClientRect();
  return {x:(cx-r.left)*VW/r.width, y:(cy-r.top)*VH/r.height};
}
function startRun(){ reset(); st='play'; }
function act(a,xy){
  ac();
  if(a==='pause'){
    if(st==='play')pause();
    else if(st==='paused')resume();
    else if(st==='dead'&&deathT>0.4)toMenu();
    else if(st==='stats'||st==='custom')toMenu();
    musicMaybeStart(); return;
  }
  if(st==='stats'){ toMenu(); musicMaybeStart(); return; }
  if(st==='custom'){
    if(a==='left'){ changeOpt(catSel,-1); return; }
    if(a==='right'){ changeOpt(catSel,1); return; }
    if(a==='up'){ catSel=(catSel-1+CATS.length)%CATS.length; return; }
    if(a==='down'){ catSel=(catSel+1)%CATS.length; return; }
    if(a==='tap'){
      if(inRect(xy,CUST_DONE)){ toMenu(); return; }
      const row=custRowAt(xy);
      if(row>=0){ catSel=row; changeOpt(row, xy.x<VW/2?-1:1); }
      else if(xy&&xy.y<40) toMenu();
    }
    return;
  }
  if(st==='menu'){
    if(a==='tap'){
      if(inRect(xy,MUTE_BTN)){ toggleMute(); return; }
      if(inRect(xy,STATS_BTN)){ st='stats'; tone(520,640,0.08,'square',0.08); return; }
      if(inRect(xy,CUSTOM_BTN)){ st='custom'; catSel=0; tone(520,640,0.08,'square',0.08); return; }
    }
    startRun(); musicMaybeStart(); return;
  }
  if(st==='paused'){
    if(a==='tap'){
      if(inRect(xy,PMUTE_BTN))toggleMute();
      else if(inRect(xy,PMENU_BTN))toMenu();
      else resume();
    }
    else if(a==='up')resume();
    return;
  }
  if(st==='dead'){
    if(deathT<=0.55)return;
    if(a==='tap'&&inRect(xy,DEAD_MENU))toMenu();
    else if(a==='tap'&&inRect(xy,DEAD_SHARE))shareScore();
    else retry();
    return;
  }
  if(st==='play'){
    if(a==='tap'&&inRect(xy,PAUSE_BTN)){ pause(); return; }
    a==='down'?doSlide():doJump();
  }
}
let tS=null;
cv.addEventListener('touchstart',e=>{ e.preventDefault();
  const t0=e.changedTouches[0];
  tS={x:t0.clientX,y:t0.clientY,t:performance.now(),done:false};
},{passive:false});
cv.addEventListener('touchmove',e=>{ e.preventDefault();
  if(!tS||tS.done)return;
  const t0=e.changedTouches[0], dy=t0.clientY-tS.y;
  if(dy<-24){tS.done=true;act('up');}
  else if(dy>24){tS.done=true;act('down');}
},{passive:false});
cv.addEventListener('touchend',e=>{ e.preventDefault();
  if(tS&&!tS.done&&performance.now()-tS.t<350){
    const t0=e.changedTouches[0];
    act('tap',canvasXY(t0.clientX,t0.clientY));
  }
  tS=null;
},{passive:false});
cv.addEventListener('mousedown',e=>{ act(e.button===2?'down':'tap',canvasXY(e.clientX,e.clientY)); });
cv.addEventListener('contextmenu',e=>e.preventDefault());
addEventListener('keydown',e=>{
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyW','KeyS'].includes(e.code))e.preventDefault();
  if(e.repeat)return;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')act('up');
  if(e.code==='ArrowDown'||e.code==='KeyS')act('down');
  if(e.code==='ArrowLeft')act('left');
  if(e.code==='ArrowRight')act('right');
  if(e.code==='Escape'||e.code==='KeyP')act('pause');
});

/* ---------------- spawn ---------------- */
function spawn(sp){
  const x=VW+60, r=Math.random(), m=dist/30;
  if(r<0.20){
    const g=Math.random()<0.6;
    ents.push({type:g?'pillG':'pillB', x, y:GY-(Math.random()<0.5?26:58), bob:Math.random()*6});
  } else {
    const traps=['pit','net'];
    if(m>120)traps.push('cart');
    if(m>260)traps.push('bird');
    const t=traps[Math.random()*traps.length|0];
    if(t==='pit'){
      const w=44+Math.random()*16+Math.min(8,dist*0.002);
      const e={type:'pit',x,w};
      if(firstPit){e.hint='SALTA!';firstPit=false;}
      ents.push(e);
    } else if(t==='net'){
      const e={type:'net',x};
      if(firstNet){e.hint='SCIVOLA!';firstNet=false;}
      ents.push(e);
    } else if(t==='cart'){
      const e={type:'cart',x};
      if(firstCart){e.hint='SALTA!';firstCart=false;}
      ents.push(e);
    } else {
      const e={type:'bird',x};
      if(firstBird){e.hint='SCIVOLA!';firstBird=false;}
      ents.push(e);
    }
  }
  spawnT=Math.max(0.55,(0.8+Math.random()*0.7)*(300/sp));
}

/* ---------------- collisioni / morte ---------------- */
function overPit(){
  for(const e of ents)
    if(e.type==='pit' && PX>e.x+8 && PX<e.x+e.w-8) return e;
  return null;
}
const PIT_MSG=['La fisioterapia ti aspetta...','Ti ripescano col montacarichi.',
  'Il fosso ha vinto, il nonno no.','Domani si riprova, Gino!'];
const NET_MSG=['L\'infermiera Pina non perdona.','Riportato alla tombola delle 15:00.',
  'Stasera: purea e documentari.','Preso come una farfalla!'];
const CART_MSG=['Travolto dal carrello dei medicinali!','Pillole ovunque, nonno a terra.',
  'Quel carrello era proprio lì in mezzo...'];
const BIRD_MSG=['Beccato in pieno dal piccione!','Maledetti piccioni del parco!',
  'Frenato da una piuma in faccia.'];
function startFall(pit){
  st='dying'; deathKind='pit'; deathT=0;
  fallX=Math.min(Math.max(PX,pit.x+12),pit.x+pit.w-12);
  P.vy=40; SFX.fall(); shake=8; vib(150);
}
function caught(e){
  st='dying'; deathKind='net'; deathT=0; netHit=e;
  SFX.caught(); shake=6; vib(150);
  burst(e.x-44,GY-38,'#fff',8);
}
function crash(kind){
  st='dying'; deathKind=kind; deathT=0; fallRot=0;
  P.vy=-260; SFX.caught(); shake=7; vib(150);
}
function gameOver(){
  st='dead'; deathT=0; newSkinMsg='';
  const s=Math.floor(score);
  if(s>hi){
    const prev=hi;
    hi=s; newHi=true; localStorage.setItem('nonnoRunHi',hi); SFX.record();
    const nuove=[];
    for(const c of CATS)for(const o of c.list){ const r=c.req(o); if(r>prev&&r<=hi)nuove.push(c.name(o)); }
    if(nuove.length)newSkinMsg=nuove.slice(0,4).join(' + ');
  }
  const m={pit:PIT_MSG,net:NET_MSG,cart:CART_MSG,bird:BIRD_MSG}[deathKind]||PIT_MSG;
  deathMsg=m[Math.random()*m.length|0];
  // statistiche
  games++; localStorage.setItem('nonnoRunGames',games);
  totM+=Math.floor(dist/30); localStorage.setItem('nonnoRunTotM',totM);
  topRuns.push({s:Math.floor(score),m:Math.floor(dist/30)});
  topRuns.sort((a,b)=>b.s-a.s); topRuns=topRuns.slice(0,5);
  localStorage.setItem('nonnoRunTop',JSON.stringify(topRuns));
}
function collide(){
  const pl=prect();
  for(const e of ents){
    if(e.dead)continue;
    if(e.type==='net'){
      const r={x:e.x-55,y:GY-60,w:22,h:43};
      if(hit(pl,r)){
        if(inv>0){ e.dead=true; score+=250; SFX.smash(); shake=5;
          burst(e.x-44,GY-38,'#f2a7bd',16); burst(e.x-44,GY-38,'#fff',10); }
        else { caught(e); return; }
      }
    } else if(e.type==='cart'){
      const r={x:e.x-13,y:GY-20,w:26,h:20};
      if(hit(pl,r)){
        if(inv>0){ e.dead=true; score+=250; SFX.smash(); shake=5;
          burst(e.x,GY-12,'#c9ccd2',14); burst(e.x,GY-12,'#e2622e',8); }
        else { crash('cart'); return; }
      }
    } else if(e.type==='bird'){
      const r={x:e.x-8,y:GY-46,w:18,h:16};
      if(hit(pl,r)){
        if(inv>0){ e.dead=true; score+=250; SFX.smash(); shake=5;
          burst(e.x,GY-38,'#6b7280',14); }
        else { crash('bird'); return; }
      }
    } else if(e.type==='pillB'||e.type==='pillG'){
      const r={x:e.x-9,y:e.y-9,w:18,h:18};
      if(hit(pl,r)){
        e.dead=true;
        if(e.type==='pillB'){ inv=10; SFX.pillB(); burst(e.x,e.y,'#5d93ff',16); }
        else { turbo=8; SFX.pillG(); burst(e.x,e.y,'#3ecf5a',16); }
        score+=100*(turbo>0?2:1); vib(15);
      }
    }
  }
  ents=ents.filter(e=>!e.dead);
}

/* ---------------- update ---------------- */
function update(dt){
  tt+=dt;
  if(st==='paused')return;
  shake=Math.max(0,shake-dt*22);
  for(const p of parts){ p.t+=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.g*dt; }
  parts=parts.filter(p=>p.t<p.life);

  if(st==='menu'||st==='stats'||st==='custom'){ menuDist+=60*dt; lockFlash=Math.max(0,lockFlash-dt); return; }

  if(st==='play'){
    const sp=speed*(turbo>0?1.55:1);
    dist+=sp*dt;
    speed=170+Math.min(180,dist*0.012);
    score+=dt*sp*0.06*(turbo>0?2:1);
    inv=Math.max(0,inv-dt); turbo=Math.max(0,turbo-dt);
    biomeFlash=Math.max(0,biomeFlash-dt);
    spawnT-=dt; if(spawnT<=0)spawn(sp);

    const bi=Math.floor((dist/30)/BIOME_M);
    if(bi!==curBi){ curBi=bi; biomeName=BIOMES[bi%BIOMES.length].nome; biomeFlash=2.4; }

    P.run+=dt*sp*0.055;
    P.buf=Math.max(0,P.buf-dt);
    if(P.slide>0)P.slide-=dt;
    if(!P.ground){
      P.vy+=GRAV*dt; P.y+=P.vy*dt;
      if(P.y>=0){
        const pit=inv>0?null:overPit();
        if(pit){ startFall(pit); }
        else{
          P.y=0; P.vy=0; P.ground=true; dust(PX,GY);
          if(P.qSlide){ P.qSlide=false; doSlide(); }
          else if(P.buf>0){ P.buf=0; doJump(); }
        }
      }
    } else if(inv<=0){
      const pit=overPit(); if(pit)startFall(pit);
    }
    if(st!=='play')return;

    for(const e of ents)e.x-=sp*dt;
    ents=ents.filter(e=>e.x>-140);
    collide();

    // scintille invincibilità
    if(inv>0){ sparkT-=dt; if(sparkT<=0){ sparkT=0.05;
      part(PX+(Math.random()-.5)*26, GY+P.y-Math.random()*34,
           -60-Math.random()*40, (Math.random()-.5)*40, 0, .4, '#9cc4ff', 2); } }
    // scie turbo
    if(turbo>0 && Math.random()<0.5)
      part(VW+10, 20+Math.random()*(GY-30), -(sp*2.2), 0, 0, .35, 'rgba(255,255,255,0.5)', 1);
  }
  else if(st==='dying'){
    deathT+=dt;
    if(deathKind==='pit'){
      P.vy+=900*dt; P.y+=P.vy*dt; fallRot+=dt*4;
      if(deathT>0.9)gameOver();
    } else if(deathKind==='cart'||deathKind==='bird'){
      P.vy+=1500*dt; P.y+=P.vy*dt; if(P.y>0)P.y=0; fallRot-=dt*6;
      if(deathT>1.0)gameOver();
    } else {
      if(deathT>1.05)gameOver();
    }
  }
  else if(st==='dead'){ deathT+=dt; }
}

/* ---------------- disegno: palette ---------------- */
const GP={skin:'#eec39a',skin2:'#d9a066',hair:'#f2f2f2',pj:'#9cc3ea',pjd:'#6f9cc7',
          slip:'#8a5a3b',dk:'#333a44',cane:'#a06b3a'};

/* ---------------- personalizzazione nonno ---------------- */
const SKINS=[
  {nome:'CELESTE', pj:'#9cc3ea', pjd:'#6f9cc7', req:0},
  {nome:'ROSSO',   pj:'#f0928c', pjd:'#c0433f', req:500},
  {nome:'VERDE',   pj:'#98d6a0', pjd:'#4f9e5d', req:1500},
  {nome:'GIALLO',  pj:'#f2dc8a', pjd:'#c9a23a', req:3000},

function hx2rgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerpHex(a,b,t){ if(t<=0)return a; if(t>=1)return b;
  const A=hx2rgb(a),B=hx2rgb(b);
  return 'rgb('+Math.round(A[0]+(B[0]-A[0])*t)+','+Math.round(A[1]+(B[1]-A[1])*t)+','+Math.round(A[2]+(B[2]-A[2])*t)+')'; }
function biomePal(d){
  const f=(d/30)/BIOME_M;
  const i=Math.floor(f)%BIOMES.length, j=(i+1)%BIOMES.length;
  let t=f-Math.floor(f);
  t = t<0.85?0:(t-0.85)/0.15;       // transizione solo nell'ultimo tratto
  const A=BIOMES[i],B=BIOMES[j],W={};
  for(const k of ['sky0','sky1','hill','grass','grassD','tree','tree2','side','sideD','soil','soilD','fence'])
    W[k]=lerpHex(A[k],B[k],t);
  W.night=A.night*(1-t)+B.night*t;
  W.town =A.town *(1-t)+B.town *t;
  return W;
}

/* ---------------- meteo dinamico ---------------- */
const WEATHER_M=210; // metri per fase meteo
function weatherInt(d){
  const f=(d/30)/WEATHER_M, i=Math.floor(f)%4, j=(i+1)%4;
  let t=f-Math.floor(f); t=t<0.85?0:(t-0.85)/0.15;
  const I=k=>((i===k?1:0)*(1-t)+(j===k?1:0)*t);
  return {sunset:I(1), rain:I(2), fog:I(3)}; // 0 = sereno
}
function drawWeather(d){
  const w=weatherInt(d);
  if(w.sunset>0.01){
    const g=ctx.createLinearGradient(0,0,0,VH);
    g.addColorStop(0,'rgba(255,120,40,'+(0.30*w.sunset).toFixed(2)+')');
    g.addColorStop(0.6,'rgba(255,90,60,'+(0.16*w.sunset).toFixed(2)+')');
    g.addColorStop(1,'rgba(120,40,90,'+(0.10*w.sunset).toFixed(2)+')');
    ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  }
  if(w.rain>0.01){
    ctx.fillStyle='rgba(40,55,75,'+(0.26*w.rain).toFixed(2)+')'; ctx.fillRect(0,0,VW,VH);
    ctx.strokeStyle='rgba(180,200,230,'+(0.5*w.rain).toFixed(2)+')'; ctx.lineWidth=1;
    ctx.beginPath();
    for(let i=0;i<90;i++){
      const x=md(i*61-tt*900, VW+40)-20, y=md(i*47+tt*900, VH+40)-20;
      ctx.moveTo(x,y); ctx.lineTo(x-4,y+10);
    }
    ctx.stroke();
  }
  if(w.fog>0.01){
    ctx.fillStyle='rgba(225,228,232,'+(0.30*w.fog).toFixed(2)+')'; ctx.fillRect(0,0,VW,VH);
    ctx.fillStyle='rgba(240,242,245,'+(0.18*w.fog).toFixed(2)+')';
    for(let i=0;i<3;i++){
      const y=60+i*60, x=md(-tt*(18+i*10),VW+200)-100;
      ctx.fillRect(x,y,200,26); ctx.fillRect(x+VW+40,y,200,26);
    }
  }
}
function drawPit(e){
  const x=e.x|0, w=e.w|0;
  ctx.fillStyle='#241409'; ctx.fillRect(x,GY-1,w,VH-GY+1);
  ctx.fillStyle='#160c05'; ctx.fillRect(x+5,GY+10,w-10,VH-GY-10);
  ctx.fillStyle='#3a2412';
  for(let i=0;i<w;i+=7){ R(x+i,GY-1,4,3,'#3a2412'); }
  // mucchietti di terra ai lati
  R(x-8,GY-4,9,4,'#7a5436'); R(x-6,GY-7,5,3,'#7a5436');
  R(x+w-1,GY-4,9,4,'#7a5436'); R(x+w+1,GY-7,5,3,'#7a5436');
  // cono stradale
  R(x+w+12,GY-9,10,3,'#e2622e'); R(x+w+14,GY-15,6,7,'#e2622e'); R(x+w+15,GY-12,4,2,'#fff');
}
function drawCart(e){
  const x=e.x|0;
  R(x-11,GY-3,5,4,'#2b2b30'); R(x+6,GY-3,5,4,'#2b2b30');   // ruote
  R(x-14,GY-20,28,17,'#c9ccd2'); R(x-14,GY-20,28,2,'#e6e9ee');
  R(x-14,GY-12,28,2,'#9aa0a8');                            // ripiano
  R(x+12,GY-30,3,11,'#9aa0a8'); R(x+10,GY-31,7,2,'#9aa0a8'); // manico
  R(x-10,GY-27,5,7,'#e2622e'); R(x-3,GY-26,4,6,'#4d84f7'); R(x+3,GY-27,4,7,'#3ecf5a'); // medicine
  R(x-10,GY-27,5,1,'#fff'); R(x+3,GY-27,4,1,'#fff');
  R(x-3,GY-10,6,2,'#e23b3b'); R(x-1,GY-12,2,6,'#e23b3b');  // croce rossa
}
function drawBird(e){
  const x=e.x|0, y=GY-38, flap=Math.round(Math.sin(tt*16)*3);
  R(x-9,y-2-flap,8,3,'#565d68'); R(x+1,y-2+flap,8,3,'#565d68'); // ali
  R(x-6,y-3,12,8,'#6b7280'); R(x-6,y-3,12,2,'#7d8794');         // corpo
  R(x-11,y+1,6,3,'#565d68');                                    // coda
  R(x+4,y-7,6,7,'#5b626e');                                     // testa
  R(x+9,y-4,3,2,'#e2a02e');                                     // becco
  R(x+6,y-6,1,1,'#0a0a0a');                                     // occhio
}
function drawHint(e){
  if(!e.hint||e.x>VW-30)return;
  let hx=e.x;
  if(e.type==='pit')hx=e.x+e.w/2; else if(e.type==='net')hx=e.x-44;
  const up=(e.type==='pit'||e.type==='cart');
  const y=132+Math.sin(tt*6)*4;
  ctx.font='bold 12px monospace'; ctx.textAlign='center';
  ctx.fillStyle='#1a1426'; ctx.fillText(e.hint,hx+1,y+1);
  ctx.fillStyle='#ffe066'; ctx.fillText(e.hint,hx,y);
  ctx.fillText(up?'▲':'▼',hx,y+14);
}

/* ---------------- HUD / testi ---------------- */
function txt(s,x,y,size,col,align,shadow){
  ctx.font='bold '+size+'px monospace'; ctx.textAlign=align||'left';
  if(shadow!==false){ ctx.fillStyle='rgba(20,12,30,0.8)'; ctx.fillText(s,x+2,y+2); }
  ctx.fillStyle=col; ctx.fillText(s,x,y);
}
function drawHUD(){
  txt(String(Math.floor(score)),12,26,20,'#fff');
  txt(Math.floor(dist/30)+' m',12,42,10,'#ffe066');
  if(turbo>0) txt('x2',12,58,12,'#3ecf5a');
  // pulsante pausa
  const b=PAUSE_BTN;
  ctx.fillStyle='rgba(20,12,30,0.45)'; ctx.fillRect(b.x,b.y,b.w,b.h);
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=1; ctx.strokeRect(b.x+0.5,b.y+0.5,b.w-1,b.h-1);
  R(b.x+8,b.y+6,4,12,'#fff'); R(b.x+15,b.y+6,4,12,'#fff');
  txt('RECORD '+hi,VW-6,b.y+b.h+12,9,'#ffd76e','right');
  // barre power-up
  let bx=VW/2-46;
  if(inv>0){
    drawPill({x:bx,y:16,type:'pillB',bob:0});
    R(bx+14,13,Math.ceil(46*inv/10),6,'#4d84f7');
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(bx+13.5,12.5,47,7);
    bx+=80;
  }
  if(turbo>0){
    drawPill({x:bx,y:16,type:'pillG',bob:0});
    R(bx+14,13,Math.ceil(46*turbo/8),6,'#3ecf5a');
    ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.strokeRect(bx+13.5,12.5,47,7);
  }
}
function drawBtn(r,label,col){
  ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(r.x+1,r.y+1,r.w-2,r.h-2);
  txt(label,r.x+r.w/2,r.y+r.h/2+5,14,col,'center');
}
function drawMuteBtn(r){
  ctx.fillStyle='rgba(20,12,30,0.45)'; ctx.fillRect(r.x,r.y,r.w,r.h);
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1; ctx.strokeRect(r.x+0.5,r.y+0.5,r.w-1,r.h-1);
  const cx=r.x+9, cy=r.y+r.h/2;
  R(cx-4,cy-2,3,4,'#fff');
  ctx.fillStyle='#fff'; ctx.beginPath();
  ctx.moveTo(cx-1,cy-4); ctx.lineTo(cx+3,cy-7); ctx.lineTo(cx+3,cy+7); ctx.lineTo(cx-1,cy+4); ctx.closePath(); ctx.fill();
  if(muted){
    ctx.strokeStyle='#ff6b5e'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(cx+7,cy-4); ctx.lineTo(cx+14,cy+4); ctx.moveTo(cx+14,cy-4); ctx.lineTo(cx+7,cy+4); ctx.stroke();
  } else {
    ctx.strokeStyle='#5fe07c'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(cx+5,cy,4,-0.7,0.7); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+5,cy,7,-0.7,0.7); ctx.stroke();
  }
}
function drawStats(){
  ctx.fillStyle='rgba(20,12,30,0.80)'; ctx.fillRect(0,0,VW,VH);
  txt('STATISTICHE',VW/2,40,24,'#ffe066','center');
  txt('Partite giocate: '+games,VW/2,66,12,'#fff','center');
  txt('Metri totali: '+totM+' m',VW/2,84,12,'#fff','center');
  txt('— TOP 5 FUGHE —',VW/2,110,12,'#ffd76e','center');
  if(topRuns.length===0) txt('nessuna fuga ancora...',VW/2,138,10,'#bbb','center');
  for(let i=0;i<topRuns.length;i++){
    const r=topRuns[i], y=130+i*18;
    txt((i+1)+'.',VW/2-116,y,12,'#ffe066','left');
    txt(r.s+' pt',VW/2-92,y,12,'#fff','left');
    txt(r.m+' m',VW/2+44,y,12,'#9fd0ff','left');
  }
  drawBtn(STATS_BACK,'INDIETRO','#ffd76e');
}
function drawCustom(){
  ctx.fillStyle='rgba(20,12,30,0.86)'; ctx.fillRect(0,0,VW,VH);
  txt('PERSONALIZZA',VW/2,24,18,'#ffe066','center');
  // anteprima nonno a sinistra
  drawGrandpa(64,150,'run',tt*7);
  txt('anteprima',64,168,8,'#bbb','center');
  // righe categorie
  for(let i=0;i<CATS.length;i++){

function drawPaused(){
  ctx.fillStyle='rgba(20,12,30,0.62)'; ctx.fillRect(0,0,VW,VH);

  drawBtn(RESUME_BTN,'RIPRENDI','#5fe07c');

function drawMenu(){

  txt('~ FUGA DAL RICOVERO ~',VW/2,82,12,'#fff','center');
  drawBtn(CUSTOM_BTN,'PERSONALIZZA','#9fd0ff');
  drawGrandpa(VW/2,152,'run',tt*9);
  // pannello istruzioni
  ctx.fillStyle='rgba(20,12,30,0.72)';
  ctx.fillRect(VW/2-150,162,300,68);
  ctx.strokeStyle='rgba(255,224,102,0.5)'; ctx.lineWidth=1;
  ctx.strokeRect(VW/2-150.5,162.5,301,68);
  ctx.font='bold 9px monospace'; ctx.textAlign='center';
  const rows=[
    ['▲  TAP / SWIPE SU  —  salta il fosso','#fff'],

  ];
  rows.forEach((r,i)=>{

  drawMuteBtn(MUTE_BTN);
  ctx.fillStyle='rgba(20,12,30,0.45)'; ctx.fillRect(STATS_BTN.x,STATS_BTN.y,STATS_BTN.w,STATS_BTN.h);
  ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1; ctx.strokeRect(STATS_BTN.x+0.5,STATS_BTN.y+0.5,STATS_BTN.w-1,STATS_BTN.h-1);
  txt('STATS',STATS_BTN.x+STATS_BTN.w/2,STATS_BTN.y+15,10,'#fff','center');
}
function drawDead(){
  ctx.fillStyle='rgba(20,12,30,0.62)'; ctx.fillRect(0,0,VW,VH);
  txt(deathKind==='pit'?'SEI CADUTO NEL FOSSO!':'CATTURATO COL RETINO!',
      VW/2,86,20,'#ff6b5e','center');
  txt(deathMsg,VW/2,108,11,'#fff','center');
  txt('PUNTI  '+Math.floor(score),VW/2,144,18,'#ffe066','center');

  if(newHi){ if(Math.floor(tt*3)%2===0)
    txt('★ NUOVO RECORD! ★',VW/2,186,14,'#3ecf5a','center'); }
  else txt('RECORD  '+hi,VW/2,184,11,'#ffd76e','center');
  if(newSkinMsg && Math.floor(tt*3)%2===1)
    txt('PIGIAMA '+newSkinMsg+' SBLOCCATO!',VW/2,206,12,'#5fe07c','center');

  if(deathT>0.55){
    drawBtn(DEAD_RETRY,'RIPROVA','#5fe07c');
    drawBtn(DEAD_SHARE,'CONDIVIDI','#9fd0ff');
    drawBtn(DEAD_MENU,'MENU','#ffd76e');
  }
}

/* ---------------- frame ---------------- */
function draw(){
  ctx.save();
  if(shake>0) ctx.translate((Math.random()-.5)*shake,(Math.random()-.5)*shake);

  const d=(st==='menu'||st==='stats'||st==='custom')?menuDist:dist;
  drawWorld(d);
  for(const e of ents){
    if(e.type==='pit')drawPit(e);
  }
  for(const e of ents){
    if(e.type==='net'){
      if(st==='dying'&&deathKind==='net'&&e===netHit)drawNet(e,true);
      else drawNet(e,false);
    }
    else if(e.type==='cart')drawCart(e);
    else if(e.type==='bird')drawBird(e);
    else if(e.type==='pillB'||e.type==='pillG')drawPill(e);
  }
  // nonno
  if(st==='play'||st==='paused'){
    if(inv>0 && !(inv<2.5 && Math.floor(tt*8)%2===0)){
      const g=ctx.createRadialGradient(PX,GY+P.y-17,4,PX,GY+P.y-17,30);
      g.addColorStop(0,'rgba(120,170,255,0.45)'); g.addColorStop(1,'rgba(120,170,255,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(PX,GY+P.y-17,30,0,Math.PI*2); ctx.fill();
    }
    const pose=P.slide>0?'slide':(P.ground?'run':'jump');
    drawGrandpa(PX,GY+P.y,pose,P.run);
  } else if(st==='dying'&&deathKind==='pit'){
    drawGrandpa(fallX,GY+P.y,'jump',0,fallRot);
  } else if(st==='dying'&&(deathKind==='cart'||deathKind==='bird')){
    drawGrandpa(PX,GY+P.y,'jump',0,fallRot);
  } else if(st==='dead'){
    // niente nonno: è caduto o catturato (resta la scena)
    if(deathKind==='net'&&netHit)drawNet(netHit,true);
  }
  // particelle
  for(const p of parts){
    ctx.globalAlpha=Math.max(0,1-p.t/p.life);
    ctx.fillStyle=p.c; ctx.fillRect(p.x|0,p.y|0,p.s,p.s);
  }
  ctx.globalAlpha=1;
  // hint tutorial
  if(st==='play')for(const e of ents)drawHint(e);

  // meteo (sopra la scena, sotto HUD/menu)
  drawWeather(d);

  ctx.restore();

  // annuncio scenario
  if(biomeFlash>0 && (st==='play'||st==='paused')){
    ctx.globalAlpha=Math.min(1,biomeFlash);
    txt('SCENARIO: '+biomeName,VW/2,52,13,'#ffe066','center');
    ctx.globalAlpha=1;
  }

  if(st==='play'||st==='dying'||st==='paused')drawHUD();
  if(st==='paused')drawPaused();
  if(st==='menu')drawMenu();
  if(st==='stats')drawStats();
  if(st==='custom')drawCustom();
  if(st==='dead'){ drawHUD(); drawDead(); }
}

let last=performance.now();
function frame(now){
  const dt=Math.min(0.033,(now-last)/1000); last=now;
  update(dt); draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
document.addEventListener('visibilitychange',()=>{ last=performance.now(); });

// PWA web: service worker per giocare offline.
// Dentro l'app (Capacitor) NON si usa il SW: i file sono già locali e sempre
// aggiornati ad ogni build; rimuoviamo eventuali SW/cache vecchi rimasti.
if(window.Capacitor){
  if('serviceWorker' in navigator)
    navigator.serviceWorker.getRegistrations().then(rs=>rs.forEach(r=>r.unregister())).catch(()=>{});
  if(window.caches)
    caches.keys().then(ks=>ks.forEach(k=>caches.delete(k))).catch(()=>{});
} else if('serviceWorker' in navigator && location.protocol!=='file:'){
  addEventListener('load',()=>{
    const hadController = !!navigator.serviceWorker.controller;
    const reg=navigator.serviceWorker.register('sw.js');
    reg.then(r=>{ if(r) setInterval(()=>r.update().catch(()=>{}), 60000); }).catch(()=>{});
    let refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',()=>{
      if(refreshing)return; refreshing=true;
      // auto-aggiornamento: quando il nuovo service worker prende il controllo,
      // ricarica una volta sola (solo se era un update, non al primo install)
      if(hadController) location.reload();
    });
  });
}
